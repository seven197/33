name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev ant
        pip install --upgrade pip
        pip install buildozer==1.5.0 cython==3.0.10
    
    - name: Download and install correct build tools (33.0.2)
      run: |
        mkdir -p ~/.buildozer/android/platform/android-sdk/build-tools/33.0.2
        wget -q https://dl.google.com/android/repository/build-tools_r33.0.2-linux.zip
        unzip -q build-tools_r33.0.2-linux.zip -d ~/.buildozer/android/platform/android-sdk/build-tools/33.0.2/
        mv ~/.buildozer/android/platform/android-sdk/build-tools/33.0.2/build-tools/33.0.2/* ~/.buildozer/android/platform/android-sdk/build-tools/33.0.2/
        rm -rf ~/.buildozer/android/platform/android-sdk/build-tools/33.0.2/build-tools
        rm build-tools_r33.0.2-linux.zip
    
    - name: Build APK
      run: |
        buildozer android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: roguelike-game-apk
        path: bin/*.apk
